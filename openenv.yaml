spec_version: 1
name: resilientops
version: 0.2.0
description: Deterministic global supply chain simulator with ordering, transfer, assembly, and enterprise-priority decisions.
type: space
runtime: python
app: env:ResilientOpsEnv
port: 7860

client:
  class_name: ResilientOpsEnv
  module: env

action:
  class_name: ResilientOpsAction
  module: env

observation:
  class_name: ResilientOpsObservation
  module: env

tasks:
  - id: minor-delay
    name: Minor Delay
    difficulty: easy
    grader:
      type: deterministic
      score_range: "(0,1)"
      formula: "score = 0.60 * fill_rate + 0.40 * cost_efficiency"
  - id: port-strike
    name: Port Strike
    difficulty: medium
    grader:
      type: deterministic
      score_range: "(0,1)"
      formula: "score = 0.35 * fill_rate + 0.30 * enterprise_sla + 0.20 * cost_efficiency + 0.15 * transfer_usage"
  - id: cascading-failures
    name: Cascading Failures
    difficulty: hard
    grader:
      type: deterministic
      score_range: "(0,1)"
      formula: "score = 0.35 * profit_score + 0.25 * enterprise_sla + 0.20 * fill_rate + 0.10 * assembly_score + 0.10 * cost_mgmt"

default_image: resilientops:latest
